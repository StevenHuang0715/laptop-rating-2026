<head>

        /* 基礎全域設定 */
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f3f4f6; padding: 20px; color: #1f2937; font-size: 16px; margin: 0; }
        .container { max-width: 1650px; margin: 0 auto; }
        h2 { color: #1e40af; text-align: center; margin-bottom: 25px; font-size: 2rem; }
        
        /* 控制面板區 */
        .dashboard { background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; border-top: 6px solid #2563eb; }
        .filter-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #e5e7eb; flex-wrap: wrap; gap: 15px; }
        .filter-group { display: flex; align-items: center; gap: 12px; font-weight: bold; font-size: 1.1rem; }
        .filter-group input { padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 8px; width: 130px; font-size: 1rem; }
        
        /* 桌機排除按鈕樣式 (與預算同一橫列) */
        #toggleFilterBtn { padding: 10px 16px; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; border: none; color: white; background-color: #dc2626; transition: background 0.2s; margin-left: 10px; }

        .weight-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; font-size: 1.1rem; }
        .points-badge { background: #1e293b; color: #fbbf24; padding: 8px 20px; border-radius: 20px; font-weight: 900; border: 2px solid #fbbf24; font-size: 1.05rem; }

        /* 權重滑桿區 */
        .slider-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin-bottom: 10px; }
        .slider-item { background: #f9fafb; padding: 15px; border-radius: 10px; border: 1px solid #e5e7eb; }
        .slider-item label { font-weight: 800; display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 1.05rem; color: #4b5563; }
        .val-text { color: #2563eb; background: #dbeafe; padding: 2px 8px; border-radius: 10px; font-weight: 900; }
        .slider-item input[type="range"] { width: 100%; cursor: pointer; }
        
        /* 📱 手機專用排序區塊 (預設桌機隱藏) */
        .sort-dashboard { display: none; background: #f8fafc; padding: 15px 20px; border-radius: 10px; border: 1px solid #e2e8f0; margin-top: 15px; }
        .sort-header { font-weight: bold; font-size: 1.05rem; color: #334155; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
        .sort-btn-group { display: flex; flex-wrap: wrap; gap: 10px; }
        .sort-btn { padding: 8px 16px; border: 1px solid #cbd5e1; background: #fff; border-radius: 8px; font-size: 0.95rem; font-weight: bold; color: #475569; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: all 0.15s; }
        .sort-btn:hover { background: #f1f5f9; border-color: #94a3b8; color: #1e293b; }
        .sort-btn.active-asc { background: #eff6ff; color: #2563eb; border-color: #3b82f6; font-weight: 900; }
        .sort-btn.active-asc::after { content: " ▲"; }
        .sort-btn.active-desc { background: #eff6ff; color: #2563eb; border-color: #3b82f6; font-weight: 900; }
        .sort-btn.active-desc::after { content: " ▼"; }

        /* 💻 桌機專用：進階直覺表頭排序樣式 */
        .table-wrapper { background: #fff; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        
        /* 📌 關鍵修正：桌機版頁面下滾時，欄位標題固定在頂端 */
        th { 
            background-color: #1e293b; 
            color: #fff; 
            padding: 18px 12px; 
            text-align: left; 
            user-select: none; 
            font-size: 1.05rem; 
            cursor: pointer; 
            transition: background 0.15s; 
            position: relative;
            
            /* 吸頂核心語法 */
            position: sticky;
            top: 0;
            z-index: 10;
        }
        th:hover { background-color: #334155; }
        
        /* 表頭排序箭頭視覺提示 */
        th.th-sort-asc::after { content: " ▲"; color: #fbbf24; font-weight: 900; }
        th.th-sort-desc::after { content: " ▼"; color: #fbbf24; font-weight: 900; }
        
        td { padding: 18px 12px; border-bottom: 1px solid #f3f4f6; vertical-align: top; font-size: 1.05rem; line-height: 1.4; }
        tr:nth-child(even) { background-color: #f9fafb; }
        
        /* 🎨 四級距視覺燈號 */
        .status-great { color: #16a34a; background-color: #fef08a; padding: 4px 10px; border-radius: 6px; font-weight: 900; display: inline-block; font-size: 1.2rem; } 
        .status-good { color: #16a34a; font-weight: 900; font-size: 1.2rem; display: inline-block; } 
        .status-pass { color: #1f2937; font-weight: bold; font-size: 1.15rem; display: inline-block; } 
        .status-low { color: #fef08a; background-color: #dc2626; padding: 4px 10px; border-radius: 6px; font-weight: 900; display: inline-block; font-size: 1.2rem; } 
        
        .link { color: #2563eb; text-decoration: none; font-weight: 800; display: block; margin-bottom: 4px; line-height: 1.3; font-size: 1.2rem; }
        .price-tag { color: #e11d48; font-weight: 900; font-size: 1.25rem; display: inline-block; margin-bottom: 6px; }
        .ref-text { color: #555d6d; line-height: 1.4; font-size: 0.95rem; font-weight: 500; margin-top: 3px; }
        .total-badge { font-size: 1.4rem; font-weight: 900; background: #2563eb; color: #fff; padding: 8px 16px; border-radius: 10px; display: inline-block; }

        /* 📱 手機板（RWD） */
        @media screen and (max-width: 768px) {
            body { padding: 10px; font-size: 16px; }
            .dashboard { padding: 15px; }
            .filter-row { flex-direction: column; align-items: stretch; }
            .filter-group { justify-content: space-between; flex-wrap: wrap; }
            .filter-group input { width: 45%; padding: 12px; }
            
            #toggleFilterBtn { width: 100%; margin-left: 0 !important; margin-top: 5px; text-align: center; padding: 12px; font-size: 1.1rem; }
            .points-badge { text-align: center; font-size: 1.1rem; }
            
            /* 手機版：開啟獨立排序按鈕特區 */
            .sort-dashboard { display: block; }
            .sort-btn { flex: 1 1 calc(50% - 10px); text-align: center; justify-content: center; padding: 10px; }

            table, thead, tbody, th, td, tr { display: block; width: 100% !important; box-sizing: border-box; }
            thead { display: none; }
            .table-wrapper { background: transparent; box-shadow: none; overflow: visible; }
            
            tr { 
                background: #fff !important; 
                margin-bottom: 25px; 
                border: 2px solid #cbd5e1; 
                border-radius: 14px; 
                padding: 20px; 
                box-shadow: 0 6px 16px rgba(0,0,0,0.06);
            }
            
            td { 
                padding: 12px 0 !important; 
                border-bottom: 1px dashed #e2e8f0; 
                display: flex;
                justify-content: space-between;
                align-items: center; 
                text-align: right;
                font-size: 1.1rem;
            }
            
            td:first-child { 
                flex-direction: column;
                align-items: flex-start;
                text-align: left;
                border-bottom: 3px solid #2563eb; 
                padding-bottom: 16px !important;
                margin-bottom: 10px;
            }
            
            .price-tag { display: block !important; margin-top: 6px; font-size: 1.35rem; }

            td:last-child { 
                border-bottom: none; 
                padding-top: 16px !important; 
                background-color: #f8fafc;
                margin-top: 10px;
                padding-left: 10px !important;
                padding-right: 10px !important;
                border-radius: 8px;
            }

            td:nth-child(3)::before { content: "⚡ 記憶體分數："; font-weight: bold; color: #475569; }

            td:first-child .ref-text { text-align: left; margin-top: 6px; }
        }

            <tbody id="tableBody">

    </div>
</div>

const scoreConfig = {
    cpu:  { ok: 4.0, mid: 4.1, great: 4.3 }, 
    mem:  { ok: 3.8, mid: 4.2, great: 4.5 }, 
    port: { ok: 3.5, mid: 3.6, great: 4.4 }, 
    bat:  { ok: 3.5, mid: 3.6, great: 4.4 }
};

let weights = { cpu: 35, mem: 30, port: 30, bat: 5 };
let filterActive = false;
let currentSortCol = 5; 
let currentSortDir = "desc"; 

function adjustWeights(type) {
    const val = parseInt(document.getElementById('w_' + type).value);
    weights[type] = val;
    
    let sum = weights.cpu + weights.mem + weights.port + weights.bat;
    if (sum > 100) {
        const over = sum - 100;
        weights[type] -= over;
        document.getElementById('w_' + type).value = weights[type];
    }
    
    sum = weights.cpu + weights.mem + weights.port + weights.bat;
    document.getElementById('p_left').innerText = 100 - sum;
    
    document.getElementById('v_cpu').innerText = weights.cpu + '%';
    document.getElementById('v_mem').innerText = weights.mem + '%';
    document.getElementById('v_port').innerText = weights.port + '%';
    document.getElementById('v_bat').innerText = weights.bat + '%';
    
    renderTable();
}

function renderTable() {
    const tbody = document.getElementById('tableBody');
    const minP = parseFloat(document.getElementById('minP').value) || 0;
    const maxP = parseFloat(document.getElementById('maxP').value) || 999999;
    tbody.innerHTML = "";

    laptopData.forEach(lp => {
        if (lp.price < minP || lp.price > maxP) return;

        let failCount = 0;
        if (lp.s_cpu < scoreConfig.cpu.ok) failCount++;
        if (lp.s_mem < scoreConfig.mem.ok) failCount++;
        if (lp.s_port < scoreConfig.port.ok) failCount++;
        if (lp.s_bat < scoreConfig.bat.ok) failCount++;

        if (filterActive && failCount >= 2) return;

        const total = (
            (lp.s_cpu * weights.cpu / 100) + (lp.s_mem * weights.mem / 100) + 
            (lp.s_port * weights.port / 100) + (lp.s_bat * weights.bat / 100)
        ).toFixed(2);
        
        const getColorClass = (score, key) => {
            const config = scoreConfig[key];
            if (score >= config.great) return "status-great"; 
            else if (score >= config.mid) return "status-good";  
            else if (score >= config.ok) return "status-pass";   
            else return "status-low";                            
        };

        tbody.innerHTML += `
            <tr data-price="${lp.price}" data-val="${total}">
                <td>
                    <a href="${lp.url}" target="_blank" class="link">${lp.name}</a>
                    <span class="price-tag">$${lp.price.toLocaleString()}</span>
                    <div class="ref-text">💾 ${lp.ssd} ／ 🖥 ${lp.screen}</div>
                </td>
                <td data-val="${lp.s_cpu}"><span class="score ${getColorClass(lp.s_cpu, 'cpu')}">${lp.s_cpu}</span><div class="ref-text">${lp.d_cpu}</div></td>
                <td data-val="${lp.s_mem}"><span class="score ${getColorClass(lp.s_mem, 'mem')}">${lp.s_mem}</span><div class="ref-text">${lp.d_mem}</div></td>
                <td data-val="${lp.s_port}"><span class="score ${getColorClass(lp.s_port, 'port')}">${lp.s_port}</span><div class="ref-text">${lp.d_port}</div></td>
                <td data-val="${lp.s_bat}"><span class="score ${getColorClass(lp.s_bat, 'bat')}">${lp.s_bat}</span><div class="ref-text">${lp.d_bat}</div></td>
                <td data-val="${total}"><span class="total-badge">${total}</span></td>
            </tr>
        `;
    });
    
    executeSort();
}

function toggleFailFilter() {
    filterActive = !filterActive;
    const btn = document.getElementById('toggleFilterBtn');
    if (filterActive) {
        btn.innerText = "顯示全部項目";
        btn.style.backgroundColor = "#1e293b";
    } else {
        btn.innerText = "排除 2 項以上不及格的筆電";
        btn.style.backgroundColor = "#dc2626";
    }
    renderTable();
}

// 統一排序觸發器 (自動更新桌機 TH 與手機 Button 樣式)
function triggerSort(colIndex) {
    if (currentSortCol === colIndex) {
        currentSortDir = (currentSortDir === "desc") ? "asc" : "desc";
    } else {
        currentSortCol = colIndex;
        currentSortDir = (colIndex === 0) ? "asc" : "desc"; // 價格預設低到高，其餘分數高到低
    }
    
    // 1. 更新桌機用 TH 欄位樣式
    document.querySelectorAll('th').forEach(th => {
        th.classList.remove('th-sort-asc', 'th-sort-desc');
    });
    const activeTh = document.getElementById('th_' + colIndex);
    if (activeTh) {
        activeTh.classList.add(currentSortDir === "asc" ? 'th-sort-asc' : 'th-sort-desc');
    }

    // 2. 更新手機用獨立按鈕樣式
    document.querySelectorAll('.sort-btn').forEach(btn => {
        btn.classList.remove('active-asc', 'active-desc');
    });
    const activeBtn = document.getElementById('m_sort_' + colIndex);
    if (activeBtn) {
        activeBtn.classList.add(currentSortDir === "asc" ? 'active-asc' : 'active-desc');
    }
    
    executeSort();
}

// 排序核心運算
function executeSort() {
    const table = document.getElementById("laptopTable");
    const tbody = table.querySelector("tbody");
    const rows = Array.from(tbody.rows);

    rows.sort((a, b) => {
        let xVal, yVal;
        
        // 如果是依「價格」排序 (欄位 0)
        if (currentSortCol === 0) {
            xVal = parseFloat(a.getAttribute("data-price")) || 0;
            yVal = parseFloat(b.getAttribute("data-price")) || 0;
            
            // 當價格一模一樣時，自動觸發第二排序：總分高者在前
            if (xVal === yVal) {
                let xTotal = parseFloat(a.getAttribute("data-val")) || 0;
                let yTotal = parseFloat(b.getAttribute("data-val")) || 0;
                return yTotal - xTotal; 
            }
            
            return currentSortDir === "asc" ? xVal - yVal : yVal - xVal;
        } 
        
        // 如果是依其他規格或加權總分排序
        else {
            xVal = parseFloat(a.getElementsByTagName("TD")[currentSortCol].getAttribute("data-val")) || 0;
            yVal = parseFloat(b.getElementsByTagName("TD")[currentSortCol].getAttribute("data-val")) || 0;
            return currentSortDir === "asc" ? xVal - yVal : yVal - xVal;
        }
    });

    rows.forEach(row => tbody.appendChild(row));
}

window.onload = function() {
    adjustWeights('cpu');
};

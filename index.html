<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 筆電規格評分推薦表</title>
    <style>
        /* 基礎全域設定 */
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f3f4f6; padding: 20px; color: #1f2937; font-size: 16px; margin: 0; }
        .container { max-width: 1650px; margin: 0 auto; }
        h2 { color: #1e40af; text-align: center; margin-bottom: 25px; font-size: 2rem; }
        
        /* 控制面板區 */
        .dashboard { background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border-top: 6px solid #2563eb; }
        .filter-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #e5e7eb; flex-wrap: wrap; gap: 15px; }
        .filter-group { display: flex; align-items: center; gap: 12px; font-weight: bold; font-size: 1.1rem; }
        .filter-group input { padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 8px; width: 130px; font-size: 1rem; }
        
        /* Switch 開關容器與樣式 */
        .switch-container { display: flex; align-items: center; gap: 10px; font-size: 1rem; cursor: pointer; user-select: none; margin-left: 10px; }
        .switch-label { font-weight: bold; color: #4b5563; transition: color 0.2s; }
        .switch-label.active { color: #dc2626; font-weight: 900; }
        
        .switch-track { 
            position: relative; 
            width: 60px; 
            height: 32px; 
            background-color: #cbd5e1; 
            border-radius: 16px; 
            transition: background-color 0.2s; 
        }
        .switch-thumb { 
            position: absolute; 
            top: 3px; 
            left: 3px; 
            width: 26px; 
            height: 26px; 
            background-color: white; 
            border-radius: 50%; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); 
            transition: transform 0.2s; 
        }
        
        /* 當開關被啟動時（排除不及格）的樣式變更 */
        .switch-container.checked .switch-track { background-color: #dc2626; }
        .switch-container.checked .switch-thumb { transform: translateX(28px); }

        .weight-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; font-size: 1.1rem; }
        .points-badge { background: #1e293b; color: #fbbf24; padding: 8px 20px; border-radius: 20px; font-weight: 900; border: 2px solid #fbbf24; font-size: 1.05rem; }

        /* 權重滑桿區 */
        .slider-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin-bottom: 10px; }
        .slider-item { background: #f9fafb; padding: 15px; border-radius: 10px; border: 1px solid #e5e7eb; }
        .slider-item label { font-weight: 800; display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 1.05rem; color: #4b5563; }
        .val-text { color: #2563eb; background: #dbeafe; padding: 2px 8px; border-radius: 10px; font-weight: 900; }
        .slider-item input[type="range"] { width: 100%; cursor: pointer; }
        
        /* 📱 手機專用排序區塊 */
        .sort-dashboard { display: none; background: #f8fafc; padding: 15px 20px; border-radius: 10px; border: 1px solid #e2e8f0; margin-top: 15px; }
        .sort-header { font-weight: bold; font-size: 1.05rem; color: #334155; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
        .sort-btn-group { display: flex; flex-wrap: wrap; gap: 10px; }
        .sort-btn { padding: 8px 16px; border: 1px solid #cbd5e1; background: #fff; border-radius: 8px; font-size: 0.95rem; font-weight: bold; color: #475569; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: all 0.15s; }
        .sort-btn:hover { background: #f1f5f9; border-color: #94a3b8; color: #1e293b; }
        .sort-btn.active-asc { background: #eff6ff; color: #2563eb; border-color: #3b82f6; font-weight: 900; }
        .sort-btn.active-asc::after { content: " ▲"; }
        .sort-btn.active-desc { background: #eff6ff; color: #2563eb; border-color: #3b82f6; font-weight: 900; }
        .sort-btn.active-desc::after { content: " ▼"; }

        /* 💡 燈號圖例說明的樣式 */
        .legend-bar { background: #fff; padding: 15px 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 15px; display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .legend-title { font-weight: 800; font-size: 1.05rem; color: #4b5563; }
        .legend-group { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.95rem; font-weight: bold; }

        /* 桌機表格配置與表頭吸頂 */
        .table-wrapper { background: #fff; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        
        th { 
            background-color: #1e293b; 
            color: #fff; 
            padding: 18px 12px; 
            text-align: left; 
            user-select: none; 
            font-size: 1.05rem; 
            cursor: pointer; 
            transition: background 0.15s; 
            position: sticky;
            top: 0;
            z-index: 10;
        }
        th:hover { background-color: #334155; }
        
        th.th-sort-asc::after { content: " ▲"; color: #fbbf24; font-weight: 900; }
        th.th-sort-desc::after { content: " ▼"; color: #fbbf24; font-weight: 900; }
        
        td { padding: 18px 12px; border-bottom: 1px solid #f3f4f6; vertical-align: top; font-size: 1.05rem; line-height: 1.4; }
        tr:nth-child(even) { background-color: #f9fafb; }
        
        /* 🎨 四級距視覺燈號 */
        .status-great { color: #16a34a; background-color: #fef08a; padding: 4px 10px; border-radius: 6px; font-weight: 900; display: inline-block; font-size: 1.2rem; } 
        .status-good { color: #16a34a; font-weight: 900; font-size: 1.2rem; display: inline-block; } 
        .status-pass { color: #1f2937; font-weight: bold; font-size: 1.15rem; display: inline-block; } 
        .status-low { color: #fef08a; background-color: #dc2626; padding: 4px 10px; border-radius: 6px; font-weight: 900; display: inline-block; font-size: 1.2rem; } 
        
        .prod-name { color: #1e293b; font-weight: 800; display: block; margin-bottom: 4px; line-height: 1.3; font-size: 1.2rem; }
        .price-tag { color: #e11d48; font-weight: 900; font-size: 1.25rem; display: inline-block; margin-bottom: 6px; }
        .ref-text { color: #555d6d; line-height: 1.4; font-size: 0.95rem; font-weight: 500; margin-top: 3px; }
        .total-badge { font-size: 1.4rem; font-weight: 900; background: #2563eb; color: #fff; padding: 8px 16px; border-radius: 10px; display: inline-block; }

        /* 📱 手機板（RWD） */
        @media screen and (max-width: 768px) {
            body { padding: 10px; font-size: 16px; }
            .dashboard { padding: 15px; }
            .filter-row { flex-direction: column; align-items: stretch; }
            .filter-group { justify-content: space-between; flex-wrap: wrap; }
            .filter-group input { width: 45%; padding: 12px; }
            
            /* 手機板時讓 Switch 置中加寬 */
            .switch-container { width: 100%; margin-left: 0 !important; margin-top: 10px; justify-content: center; padding: 10px 0; background: #f8fafc; border-radius: 8px; border: 1px solid #cbd5e1; }
            .points-badge { text-align: center; font-size: 1.1rem; }
            
            .sort-dashboard { display: block; }
            .sort-btn { flex: 1 1 calc(50% - 10px); text-align: center; justify-content: center; padding: 10px; }

            .legend-bar { padding: 12px; gap: 8px; flex-direction: column; align-items: flex-start; }

            table, thead, tbody, th, td, tr { display: block; width: 100% !important; box-sizing: border-box; }
            thead { display: none; }
            .table-wrapper { background: transparent; box-shadow: none; overflow: visible; }
            
            tr { 
                background: #fff !important; 
                margin-bottom: 25px; 
                border: 2px solid #cbd5e1; 
                border-radius: 14px; 
                padding: 20px; 
                box-shadow: 0 6px 16px rgba(0,0,0,0.06);
            }
            
            td { 
                padding: 12px 0 !important; 
                border-bottom: 1px dashed #e2e8f0; 
                display: flex;
                justify-content: space-between;
                align-items: center; 
                text-align: right;
                font-size: 1.1rem;
            }
            
            td:first-child { 
                flex-direction: column;
                align-items: flex-start;
                text-align: left;
                border-bottom: 3px solid #2563eb; 
                padding-bottom: 16px !important;
                margin-bottom: 10px;
            }
            
            .price-tag { display: block !important; margin-top: 6px; font-size: 1.35rem; }

            td:last-child { 
                border-bottom: none; 
                padding-top: 16px !important; 
                background-color: #f8fafc;
                margin-top: 10px;
                padding-left: 10px !important;
                padding-right: 10px !important;
                border-radius: 8px;
            }

            td:nth-child(2)::before { content: "🧠 處理器分數："; font-weight: bold; color: #475569; }
            td:nth-child(3)::before { content: "⚡ 記憶體分數："; font-weight: bold; color: #475569; }
            td:nth-child(4)::before { content: "⚖️ 重量便攜分數："; font-weight: bold; color: #475569; }
            td:nth-child(5)::before { content: "🔋 續航力評估分："; font-weight: bold; color: #475569; }
            td:nth-child(6)::before { content: "📊 最終加權總分："; font-weight: bold; color: #1e40af; font-size: 1.15rem; }
            
            td .ref-text { margin-top: 4px; text-align: right; display: block; }
            td:first-child .ref-text { text-align: left; margin-top: 6px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>💻 推薦筆電規格評分專區</h2>
    
    <div class="dashboard">
        <div class="filter-row">
            <div class="filter-group">💰 預算篩選：
                <input type="number" id="minP" value="25000" placeholder="最低" oninput="renderTable()"> — 
                <input type="number" id="maxP" value="35000" placeholder="最高" oninput="renderTable()">
                
                <div class="switch-container checked" id="failFilterSwitch" onclick="toggleFailFilter()">
                    <span class="switch-label" id="lbl_showAll">顯示全部</span>
                    <div class="switch-track">
                        <div class="switch-thumb"></div>
                    </div>
                    <span class="switch-label active" id="lbl_hideFail">排除 2 項以上不及格</span>
                </div>
            </div>
            <div class="points-badge">目前剩餘可分配點數：<span id="p_left">0</span>%</div>
        </div>

        <div class="weight-header">⚙️ 評分權重調整 (總計100%)</div>
        <div class="slider-grid">
            <div class="slider-item">
                <label>處理器 (及格4.0) <span class="val-text" id="v_cpu">35%</span></label>
                <input type="range" id="w_cpu" min="0" max="100" step="5" value="35" oninput="adjustWeights('cpu')">
            </div>
            <div class="slider-item">
                <label>記憶體 (及格4.2) <span class="val-text" id="v_mem">30%</span></label>
                <input type="range" id="w_mem" min="0" max="100" step="5" value="30" oninput="adjustWeights('mem')">
            </div>
            <div class="slider-item">
                <label>重量便攜 (及格3.5) <span class="val-text" id="v_port">30%</span></label>
                <input type="range" id="w_port" min="0" max="100" step="5" value="30" oninput="adjustWeights('port')">
            </div>
            <div class="slider-item">
                <label>續航力評估 (及格3.5) <span class="val-text" id="v_bat">5%</span></label>
                <input type="range" id="w_bat" min="0" max="100" step="5" value="5" oninput="adjustWeights('bat')">
            </div>
        </div>

        <div class="sort-dashboard" id="mobileSortBar">
            <div class="sort-header">📊 項目動態排序（點擊可切換 正序 / 倒序）：</div>
            <div class="sort-btn-group">
                <button class="sort-btn active-desc" id="m_sort_5" onclick="triggerSort(5)">🏆 依最終加權總分</button>
                <button class="sort-btn" id="m_sort_0" onclick="triggerSort(0)">💰 依筆電價格 (同價比總分)</button>
                <button class="sort-btn" id="m_sort_1" onclick="triggerSort(1)">🧠 依處理器分數</button>
                <button class="sort-btn" id="m_sort_2" onclick="triggerSort(2)">⚡ 依記憶體分數</button>
                <button class="sort-btn" id="m_sort_3" onclick="triggerSort(3)">⚖️ 依重量便攜分數</button>
                <button class="sort-btn" id="m_sort_4" onclick="triggerSort(4)">🔋 依續航力評估分</button>
            </div>
        </div>
    </div>

    <div class="legend-bar">
        <span class="legend-title">💡 燈號說明：</span>
        <div class="legend-group">
            <div class="legend-item"><span class="status-great">4.4 ~ 5.0</span> <span>黃底綠字（優良）</span></div>
            <div class="legend-item"><span class="status-good">4.1 ~ 4.3</span> <span>純綠色字（良好）</span></div>
            <div class="legend-item"><span class="status-pass">3.5 ~ 4.0</span> <span>純深灰色（及格）</span></div>
            <div class="legend-item"><span class="status-low">1.0 ~ 3.4</span> <span>紅底黃字（不及格）</span></div>
        </div>
    </div>

    <div class="table-wrapper">
        <table id="laptopTable">
            <thead>
                <tr>
                    <th style="width: 32%;" id="th_0" onclick="triggerSort(0)">筆電型號名稱 / 價格</th>
                    <th style="width: 15%;" id="th_1" onclick="triggerSort(1)">處理器分數</th>
                    <th style="width: 15%;" id="th_2" onclick="triggerSort(2)">記憶體分數</th>
                    <th style="width: 14%;" id="th_3" onclick="triggerSort(3)">重量分數</th>
                    <th style="width: 14%;" id="th_4" onclick="triggerSort(4)">續航力分數</th>
                    <th style="width: 10%;" id="th_5" class="th-sort-desc" onclick="triggerSort(5)">加權總分</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
    </div>
</div>

<script>
const laptopData = [
    { name: "ASUS ExpertBook 14 AI", price: 36499, ssd: "1TB (雙M.2)", screen: "14.0\" FHD+ IPS", s_cpu: 4.8, d_cpu: "R7 8840U (38T)", s_mem: 4.8, d_mem: "32G (可擴64G)", s_port: 4.2, d_port: "1.34kg", bat_cap: 63, p_draw: 1.0, d_bat: "63Wh" },

    { name: "ACER Extensa 14", price: 32118, ssd: "512G SSD", screen: "14.0\" WUXGA IPS", s_cpu: 4.3, d_cpu: "Ultra 7-155H", s_mem: 4.2, d_mem: "16G (雙插槽)", s_port: 3.2, d_port: "1.47kg", bat_cap: 55, p_draw: 1.4, d_bat: "55Wh" },
    { name: "ASUS Vivobook S14 OLED", price: 36499, ssd: "512G SSD", screen: "14.0\" WUXGA OLED", s_cpu: 4.2, d_cpu: "Ultra 5 226V (40T)", s_mem: 3.8, d_mem: "16G (不可擴)", s_port: 4.3, d_port: "1.3kg", bat_cap: 75, p_draw: 1.0, d_bat: "75Wh" },
    { name: "ACER Swift Lite (銀/U7)", price: 36400, ssd: "512G SSD", screen: "14.0\" WUXGA IPS", s_cpu: 4.3, d_cpu: "Ultra 7 155U", s_mem: 4.5, d_mem: "32G RAM", s_port: 5.0, d_port: "999g", bat_cap: 50, p_draw: 1.2, d_bat: "50Wh" },
    { name: "MSI Modern A14 AI+", price: 32400, ssd: "512G SSD", screen: "14.0\" FHD IPS", s_cpu: 4.0, d_cpu: "Ryzen AI 5-330", s_mem: 4.2, d_mem: "16G (可擴32G)", s_port: 3.5, d_port: "1.4kg", bat_cap: 46.8, p_draw: 1.1, d_bat: "46.8Wh" },
    { name: "ACER TravelMate (i5)", price: 35500, ssd: "512G SSD", screen: "14.0\" WUXGA IPS", s_cpu: 3.5, d_cpu: "i5-1335U", s_mem: 4.2, d_mem: "16G DDR4", s_port: 3.5, d_port: "1.41kg", bat_cap: 56, p_draw: 1.5, d_bat: "56Wh" },
    { name: "ACER Swift 14 (40T)", price: 33400, ssd: "512G SSD", screen: "14.0\" WUXGA IPS", s_cpu: 4.2, d_cpu: "Ultra 5-226V (40T)", s_mem: 3.8, d_mem: "16G Onboard", s_port: 4.6, d_port: "1.24kg", bat_cap: 65, p_draw: 1.0, d_bat: "65Wh" },
    { name: "ACER TravelMate 14 (R7)", price: 35118, ssd: "512G SSD", screen: "14.0\" WUXGA IPS", s_cpu: 3.8, d_cpu: "R7 PRO 7735U", s_mem: 4.2, d_mem: "16G DDR5", s_port: 3.5, d_port: "1.46kg", bat_cap: 53, p_draw: 1.5, d_bat: "53Wh" },
    { name: "ACER Swift 14 (32G)", price: 36118, ssd: "512G SSD", screen: "14.0\" WUXGA IPS", s_cpu: 4.2, d_cpu: "Ultra 5-228V (40T)", s_mem: 4.5, d_mem: "32G Onboard", s_port: 4.6, d_port: "1.24kg", bat_cap: 65, p_draw: 1.0, d_bat: "65Wh" },

    { name: "ACER Swift Lite (粉)", price: 33400, ssd: "512G SSD", screen: "14.0\" WUXGA IPS", s_cpu: 3.5, d_cpu: "Ultra 5-115U", s_mem: 4.8, d_mem: "32G RAM", s_port: 5.0, d_port: "999g", bat_cap: 50, p_draw: 1.2, d_bat: "50Wh" },
    { name: "ACER Swift Lite (R5 AI)", price: 34400, ssd: "512G SSD", screen: "14.0\" WUXGA IPS", s_cpu: 3.5, d_cpu: "Ryzen 5 240", s_mem: 4.5, d_mem: "32G RAM", s_port: 5.0, d_port: "999g", bat_cap: 50, p_draw: 1.2, d_bat: "50Wh" },
    { name: "ASUS ExpertBook B1", price: 32499, ssd: "512G SSD", screen: "14.0\" FHD IPS", s_cpu: 3.8, d_cpu: "Core 7 150U", s_mem: 4.2, d_mem: "16G (具SO-DIMM)", s_port: 3.5, d_port: "1.4kg", bat_cap: 42, p_draw: 1.5, d_bat: "42Wh" },
];

const scoreConfig = {
    cpu:  { ok: 4.0, mid: 4.1, great: 4.3 }, 
    mem:  { ok: 3.8, mid: 4.2, great: 4.5 }, 
    port: { ok: 3.5, mid: 3.6, great: 4.4 }, 
    bat:  { ok: 3.5, mid: 3.8, great: 4.5 }
};

let weights = { cpu: 35, mem: 30, port: 30, bat: 5 };

// 🛠️ 關鍵修改二：預設值直接設為 true，一進入網頁就啟用排除模式
let filterActive = true; 

let currentSortCol = 5; 
let currentSortDir = "desc"; 

function adjustWeights(type) {
    const val = parseInt(document.getElementById('w_' + type).value);
    weights[type] = val;
    
    let sum = weights.cpu + weights.mem + weights.port + weights.bat;
    if (sum > 100) {
        const over = sum - 100;
        weights[type] -= over;
        document.getElementById('w_' + type).value = weights[type];
    }
    
    sum = weights.cpu + weights.mem + weights.port + weights.bat;
    document.getElementById('p_left').innerText = 100 - sum;
    
    document.getElementById('v_cpu').innerText = weights.cpu + '%';
    document.getElementById('v_mem').innerText = weights.mem + '%';
    document.getElementById('v_port').innerText = weights.port + '%';
    document.getElementById('v_bat').innerText = weights.bat + '%';
    
    renderTable();
}

function calculateBatteryScore(cap, draw) {
    const efficiencyIndex = cap / draw;
    let score = 2.5 + ((efficiencyIndex - (41/1.4)) / ((75/1.0) - (41/1.4))) * 2.5;
    score = Math.max(1.0, Math.min(5.0, score));
    return parseFloat(score.toFixed(1));
}

function renderTable() {
    const tbody = document.getElementById('tableBody');
    const minP = parseFloat(document.getElementById('minP').value) || 0;
    const maxP = parseFloat(document.getElementById('maxP').value) || 999999;
    tbody.innerHTML = "";

    laptopData.forEach(lp => {
        if (lp.price < minP || lp.price > maxP) return;

        const computedBatScore = calculateBatteryScore(lp.bat_cap, lp.p_draw);

        let failCount = 0;
        if (lp.s_cpu < scoreConfig.cpu.ok) failCount++;
        if (lp.s_mem < scoreConfig.mem.ok) failCount++;
        if (lp.s_port < scoreConfig.port.ok) failCount++;
        if (computedBatScore < scoreConfig.bat.ok) failCount++;

        if (filterActive && failCount >= 2) return;

        const total = (
            (lp.s_cpu * weights.cpu / 100) + (lp.s_mem * weights.mem / 100) + 
            (lp.s_port * weights.port / 100) + (computedBatScore * weights.bat / 100)
        ).toFixed(2);
        
        const getColorClass = (score, key) => {
            const config = scoreConfig[key];
            if (score >= config.great) return "status-great"; 
            else if (score >= config.mid) return "status-good";  
            else if (score >= config.ok) return "status-pass";   
            else return "status-low";                            
        };

        let efficiencyText = lp.p_draw <= 1.0 ? "🎨 省電架構" : (lp.p_draw >= 1.4 ? "⚙️ 高耗能架構" : "⚖️ 平衡架構");

        tbody.innerHTML += `
            <tr data-price="${lp.price}" data-val="${total}">
                <td>
                    <span class="prod-name">${lp.name}</span>
                    <span class="price-tag">$${lp.price.toLocaleString()}</span>
                    <div class="ref-text">💾 ${lp.ssd} ／ 🖥 ${lp.screen}</div>
                </td>
                <td data-val="${lp.s_cpu}"><span class="score ${getColorClass(lp.s_cpu, 'cpu')}">${lp.s_cpu}</span><div class="ref-text">${lp.d_cpu}</div></td>
                <td data-val="${lp.s_mem}"><span class="score ${getColorClass(lp.s_mem, 'mem')}">${lp.s_mem}</span><div class="ref-text">${lp.d_mem}</div></td>
                <td data-val="${lp.s_port}"><span class="score ${getColorClass(lp.s_port, 'port')}">${lp.s_port}</span><div class="ref-text">${lp.d_port}</div></td>
                <td data-val="${computedBatScore}"><span class="score ${getColorClass(computedBatScore, 'bat')}">${computedBatScore}</span><div class="ref-text">${lp.d_bat} (${efficiencyText})</div></td>
                <td data-val="${total}"><span class="total-badge">${total}</span></td>
            </tr>
        `;
    });
    
    executeSort();
}

function toggleFailFilter() {
    filterActive = !filterActive;
    
    const container = document.getElementById('failFilterSwitch');
    const lblShowAll = document.getElementById('lbl_showAll');
    const lblHideFail = document.getElementById('lbl_hideFail');

    if (filterActive) {
        container.classList.add('checked');
        lblShowAll.classList.remove('active');
        lblHideFail.classList.add('active');
    } else {
        container.classList.remove('checked');
        lblShowAll.classList.add('active');
        lblHideFail.classList.remove('active');
    }
    renderTable();
}

function triggerSort(colIndex) {
    if (currentSortCol === colIndex) {
        currentSortDir = (currentSortDir === "desc") ? "asc" : "desc";
    } else {
        currentSortCol = colIndex;
        currentSortDir = (colIndex === 0) ? "asc" : "desc";
    }
    
    document.querySelectorAll('th').forEach(th => {
        th.classList.remove('th-sort-asc', 'th-sort-desc');
    });
    const activeTh = document.getElementById('th_' + colIndex);
    if (activeTh) {
        activeTh.classList.add(currentSortDir === "asc" ? 'th-sort-asc' : 'th-sort-desc');
    }

    document.querySelectorAll('.sort-btn').forEach(btn => {
        btn.classList.remove('active-asc', 'active-desc');
    });
    const activeBtn = document.getElementById('m_sort_' + colIndex);
    if (activeBtn) {
        activeBtn.classList.add(currentSortDir === "asc" ? 'active-asc' : 'active-desc');
    }
    
    executeSort();
}

function executeSort() {
    const table = document.getElementById("laptopTable");
    const tbody = table.querySelector("tbody");
    const rows = Array.from(tbody.rows);

    rows.sort((a, b) => {
        let xVal, yVal;
        if (currentSortCol === 0) {
            xVal = parseFloat(a.getAttribute("data-price")) || 0;
            yVal = parseFloat(b.getAttribute("data-price")) || 0;
            if (xVal === yVal) {
                let xTotal = parseFloat(a.getAttribute("data-val")) || 0;
                let yTotal = parseFloat(b.getAttribute("data-val")) || 0;
                return yTotal - xTotal; 
            }
            return currentSortDir === "asc" ? xVal - yVal : yVal - xVal;
        } else {
            xVal = parseFloat(a.getElementsByTagName("TD")[currentSortCol].getAttribute("data-val")) || 0;
            yVal = parseFloat(b.getElementsByTagName("TD")[currentSortCol].getAttribute("data-val")) || 0;
            return currentSortDir === "asc" ? xVal - yVal : yVal - xVal;
        }
    });

    rows.forEach(row => tbody.appendChild(row));
}

window.onload = function() {
    adjustWeights('cpu');
};
</script>
